version: 2

models:
  - name: fct_player_activity
    description: "Unified, deduplicated player activity across all games (full rebuild)."
    columns:
      - name: activity_key
        description: "Surrogate key: md5(game_name, player_key, event_timestamp)."
        data_tests: [not_null, unique]
      - name: player_key
        data_tests: [not_null]
      - name: game_name
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["game_a", "game_b"]
      - name: event_timestamp
        data_tests: [not_null]

  - name: fct_player_activity_incremental
    description: "Same grain as fct_player_activity, maintained incrementally."
    columns:
      - name: activity_key
        data_tests: [not_null, unique]
      - name: game_name
        data_tests: [not_null]
      - name: event_timestamp
        data_tests: [not_null]
