version: 2

sources:
  - name: raw_tables
    description: "Raw game events landed by the ingestion layer."
    schema: raw

    config:
      freshness:
        warn_after:
          count: 24
          period: hour
        error_after:
          count: 72
          period: hour

    loaded_at_field: _ingested_at

    tables:
      - name: raw_game_a_events
        description: "Raw events from Game A."
        columns:
          - name: player_id
            data_tests:
              - not_null
          - name: event_time
            data_tests:
              - not_null

      - name: raw_game_b_events
        description: "Raw events from Game B."
        columns:
          - name: user_id
            data_tests:
              - not_null
          - name: timestamp
            data_tests:
              - not_null
