version: 2

sources:
  - name: raw
    description: "Raw gaming telemetry tables loaded from BigQuery."
    schema: gamedata_64156695_staging
    config:
      meta:
        game_id: "placeholder"
        
    tables:

      - name: raw_game_a_events
        description: "Raw player master data."

      - name: raw_game_b_events
        description: "Raw gameplay activity events."




models:

  - name: int_player_activity_unioned
    description: >
      Combines player activity from multiple gameplay event sources
      into a unified intermediate model used by downstream marts.
  
  - name: fct_player_activity

  - name: fct_player_activity_incremental


macros:

  - name: surrogate_key
    description: >
      Generates a deterministic surrogate key using MD5 hashing.

  - name: generate_schema_name
    description: >
      Generates environment-specific schema names for dbt models.


data_tests:

  - name: assert_player_key_has_unique_name
    description: >
      Ensures every player key maps to exactly one player name.

  - name: assert_player_progress_within_reasonable_session_limit
    description: >
      Ensures player progression does not exceed expected session limits.

  - name: assert_timestamps_are_not_in_the_future
    description: >
      Validates event timestamps are not later than the current timestamp.    