name: "gaming_platform"
version: "1.0.0"
config-version: 2

profile: "gaming_platform"

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Layer -> schema routing.
models:
  gaming_platform:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

dispatch:
  - macro_namespace: dbt
    search_order: ['dbt_project_evaluator', 'dbt']

# Unified variables block
vars:
  event_lookback_hours: 0
  dbt_project_evaluator:
    model_types:
      - staging
      - intermediate
      - marts
      - other # Added as a fallback safety net for internal package nodes

    # Custom directory folder path mapping
    staging_folder_name: "staging"
    intermediate_folder_name: "intermediate"
    marts_folder_name: "marts"

    # Mute structural layout rules (prevents style warnings from cluttering CI/CD logs)
    check_source_directories: false
    check_model_directories: false
    check_test_directories: false
