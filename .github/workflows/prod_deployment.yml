name: Production Release Pipeline

on:
  push:
    branches: [ main ]

jobs:
  dbt-production-deploy:
    name: Build Production Warehouse Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Initialize Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Aligned with dev_testing.yml

      - name: Deploy uv Package Manager
        uses: astral-sh/setup-uv@v5 # Modern, cached astral action

      - name: Replicate Dependencies from uv.lock
        run: uv sync

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true

      - name: Execute Production Database Build
        working-directory: dbt_dagster_pipeline
        env:
          DBT_PROFILES_DIR: .
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_PROD }}
          BQ_LOCATION: ${{ secrets.BQ_LOCATION }}
          DBT_DATASET_PREFIX: prod # Enforce your prod namespace
        run: |
          uv run dbt deps
          uv run dbt build --target prod # Explicit prod target destination

      - name: Update Dagster Orchestration Definitions
        run: |
          echo "Updating live Dagster code location instance..."
          # Insert your specific Dagster Cloud or hosted instances deployment commands here
