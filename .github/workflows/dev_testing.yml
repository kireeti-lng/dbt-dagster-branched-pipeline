name: Dev Testing & Auto-Merge

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:

  # ==================================================================
  # JOB 1: Code Quality Gate
  # ==================================================================
  dbt-quality-gate:
    name: Code Scanning & Gate Pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create virtual environment
        run: uv venv

      - name: Install Dependencies
        run: uv sync

      - name: Install Linting Dependencies
        run: |
          uv pip install \
            pre-commit \
            sqlfluff \
            sqlfluff-templater-dbt
            
      # ---------------------------------------------------------------
      # Authenticate to Google Cloud
      # ---------------------------------------------------------------
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true

      # ---------------------------------------------------------------
      # Install gcloud
      # ---------------------------------------------------------------
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: bq

      # ---------------------------------------------------------------
      # Verify Authentication
      # ---------------------------------------------------------------
      - name: Verify Authentication
        run: |
          echo "Authenticated Account:"
          gcloud auth list

          echo ""
          echo "Current Configuration:"
          gcloud config list

      # ---------------------------------------------------------------
      # Verify BigQuery Access
      # ---------------------------------------------------------------
      - name: Verify BigQuery Access
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          echo "Listing datasets in $GCP_PROJECT..."
          bq ls --project_id=$GCP_PROJECT


      - name: Install dbt Dependencies
        working-directory: ./dbt_dagster_pipeline
        env:
          DBT_PROFILES_DIR: .
        run: |
          uv run dbt deps

      - name: Generate dbt Manifest
        working-directory: ./dbt_dagster_pipeline
        env:
          DBT_PROFILES_DIR: .
        run: |
          uv run dbt deps
          uv run dbt parse
          
      - name: Execute Quality Gate Checks
        run: |
          uv run pre-commit run --all-files

  # ==================================================================
  # JOB 2: dbt Validation
  # ==================================================================
  dbt-ci-test:
    name: Run dbt Validation Checks
    needs: dbt-quality-gate
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      # ---------------------------------------------------------------
      # Checkout
      # ---------------------------------------------------------------
      - name: Checkout Code Base
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Python
      # ---------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------------------------------------------------------
      # Install uv
      # ---------------------------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # ---------------------------------------------------------------
      # Install dependencies
      # ---------------------------------------------------------------
      - name: Install Dependencies
        run: uv sync

      # ---------------------------------------------------------------
      # Authenticate to Google Cloud
      # ---------------------------------------------------------------
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true

      # ---------------------------------------------------------------
      # Install gcloud
      # ---------------------------------------------------------------
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: bq

      # ---------------------------------------------------------------
      # Verify Authentication
      # ---------------------------------------------------------------
      - name: Verify Authentication
        run: |
          echo "Authenticated Account:"
          gcloud auth list

          echo ""
          echo "Current Configuration:"
          gcloud config list

      # ---------------------------------------------------------------
      # Verify BigQuery Access
      # ---------------------------------------------------------------
      - name: Verify BigQuery Access
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          echo "Listing datasets in $GCP_PROJECT..."
          bq ls --project_id=$GCP_PROJECT

      # ---------------------------------------------------------------
      # Run dbt Validation
      # ---------------------------------------------------------------
      - name: Execute dbt Validation
        working-directory: ./dbt_dagster_pipeline
        env:
          DBT_PROFILES_DIR: .
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          BQ_LOCATION: ${{ secrets.BQ_LOCATION }}
          DBT_DATASET_PREFIX: ${{ secrets.DBT_DATASET_PREFIX }}
        run: |
          uv run dbt deps
          uv run dbt debug --target ci
          uv run dbt build --target ci

      # ---------------------------------------------------------------
      # Auto Merge PR
      # ---------------------------------------------------------------
      - name: Auto Merge Pull Request
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch